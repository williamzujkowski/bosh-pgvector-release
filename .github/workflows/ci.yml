---
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BOSH_CLI_VERSION: '7.10.5'
  # SHA-256 of bosh-cli-7.10.5-linux-amd64 from the official release asset.
  # Keep in sync with release.yml.
  BOSH_CLI_SHA256: 'e9847375ba5397589e7b070305defc70321ad0e62d18b67a70a330efcab6e526'  # pragma: allowlist secret

jobs:
  build-release:
    name: bosh create-release smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install bosh CLI
        run: |
          mkdir -p "${HOME}/.local/bin"
          curl -fsSL -o "${HOME}/.local/bin/bosh" \
            "https://github.com/cloudfoundry/bosh-cli/releases/download/v${BOSH_CLI_VERSION}/bosh-cli-${BOSH_CLI_VERSION}-linux-amd64"
          echo "${BOSH_CLI_SHA256}  ${HOME}/.local/bin/bosh" | sha256sum -c -
          chmod +x "${HOME}/.local/bin/bosh"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      # Cache key derived from the script + blob manifest so a version
      # bump in fetch-blobs.sh automatically invalidates the cache.
      - name: Cache source blobs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: blobs/
          key: blobs-${{ hashFiles('scripts/fetch-blobs.sh', 'config/blobs.yml') }}

      - name: Fetch source blobs (if not cached)
        run: ./scripts/fetch-blobs.sh

      - name: Register pgvector blob with bosh
        run: |
          if ! grep -q "^pgvector/pgvector-0.8.0.tar.gz:" config/blobs.yml; then
            bosh add-blob blobs/pgvector/pgvector-0.8.0.tar.gz pgvector/pgvector-0.8.0.tar.gz
          fi

      - name: bosh create-release --force
        run: |
          bosh create-release --force \
            --name=bosh-pgvector-release \
            --version=0.0.0-ci-${{ github.run_id }} \
            --tarball=/tmp/bosh-pgvector-release-ci.tgz

      - name: Verify release contents
        run: |
          tar -tzf /tmp/bosh-pgvector-release-ci.tgz | sort > /tmp/contents.txt
          for expected in \
            packages/pgvector-15.tgz \
            packages/pgvector-16.tgz \
            packages/pgvector-17.tgz \
            packages/postgres-15.tgz \
            packages/postgres-16.tgz \
            packages/postgres-17.tgz \
            jobs/postgres.tgz \
            release.MF
          do
            if ! grep -qx "${expected}" /tmp/contents.txt; then
              echo "ERROR: tarball missing ${expected}"
              exit 1
            fi
          done
          echo "OK — tarball contains all required entries"

      - name: Upload release artifact (for inspection)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: bosh-pgvector-release-ci-${{ github.run_id }}.tgz
          path: /tmp/bosh-pgvector-release-ci.tgz
          retention-days: 7

  pre-commit:
    name: pre-commit (linters + security)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install pre-commit + pyyaml
        run: pip install pre-commit pyyaml
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  secrets-scan:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
