---
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BOSH_CLI_VERSION: '7.10.5'
  # SHA-256 of bosh-cli-7.10.5-linux-amd64 from the official release asset.
  # Keep in sync with release.yml.
  BOSH_CLI_SHA256: 'e9847375ba5397589e7b070305defc70321ad0e62d18b67a70a330efcab6e526'  # pragma: allowlist secret

jobs:
  build-release:
    name: bosh create-release smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install bosh CLI
        run: |
          mkdir -p "${HOME}/.local/bin"
          curl -fsSL -o "${HOME}/.local/bin/bosh" \
            "https://github.com/cloudfoundry/bosh-cli/releases/download/v${BOSH_CLI_VERSION}/bosh-cli-${BOSH_CLI_VERSION}-linux-amd64"
          echo "${BOSH_CLI_SHA256}  ${HOME}/.local/bin/bosh" | sha256sum -c -
          chmod +x "${HOME}/.local/bin/bosh"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      # Cache key derived from the script + blob manifest so a version
      # bump in fetch-blobs.sh automatically invalidates the cache.
      - name: Cache source blobs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: blobs/
          key: blobs-${{ hashFiles('scripts/fetch-blobs.sh', 'config/blobs.yml') }}

      - name: Fetch source blobs (if not cached)
        run: ./scripts/fetch-blobs.sh

      - name: Register pgvector blob with bosh
        run: |
          # Derive the version from fetch-blobs.sh so the CI step
          # follows the source-of-truth pin without manual updates
          # on every pgvector bump.
          PGVECTOR_VERSION="$(awk -F'[":}-]+' '/^PGVECTOR_VERSION=/ { print $3; exit }' scripts/fetch-blobs.sh)"
          BLOB_PATH="pgvector/pgvector-${PGVECTOR_VERSION}.tar.gz"
          if ! grep -q "^${BLOB_PATH}:" config/blobs.yml; then
            bosh add-blob "blobs/${BLOB_PATH}" "${BLOB_PATH}"
          fi

      - name: bosh create-release --force
        run: |
          bosh create-release --force \
            --name=bosh-pgvector-release \
            --version=0.0.0-ci-${{ github.run_id }} \
            --tarball=/tmp/bosh-pgvector-release-ci.tgz

      - name: Verify release contents
        run: |
          tar -tzf /tmp/bosh-pgvector-release-ci.tgz | sort > /tmp/contents.txt
          for expected in \
            packages/pgvector-15.tgz \
            packages/pgvector-16.tgz \
            packages/pgvector-17.tgz \
            packages/postgres-15.tgz \
            packages/postgres-16.tgz \
            packages/postgres-17.tgz \
            jobs/postgres.tgz \
            release.MF
          do
            if ! grep -qx "${expected}" /tmp/contents.txt; then
              echo "ERROR: tarball missing ${expected}"
              exit 1
            fi
          done
          echo "OK — outer tarball contains all required entries"

      - name: Verify pgvector inner packages bundle source + packaging
        run: |
          # The outer release tarball ships each package as packages/<name>.tgz.
          # Compilation happens on the BOSH director's compile VM at deploy
          # time, not in CI, so we can't prove vector.so was built here. We
          # CAN prove the inputs that the compile VM needs are present: the
          # `packaging` bash script and the pgvector source tarball matching
          # the version pinned in scripts/fetch-blobs.sh. Item #25 of #2.
          set -euo pipefail
          PGVECTOR_VERSION="$(awk -F'[":}-]+' '/^PGVECTOR_VERSION=/ { print $3; exit }' scripts/fetch-blobs.sh)"
          echo "Expecting pgvector source: pgvector/pgvector-${PGVECTOR_VERSION}.tar.gz"
          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT
          # Extract just the three pgvector inner package tarballs from
          # the outer release tarball.
          tar -xzf /tmp/bosh-pgvector-release-ci.tgz -C "${workdir}" \
            packages/pgvector-15.tgz \
            packages/pgvector-16.tgz \
            packages/pgvector-17.tgz
          failed=0
          for pg in 15 16 17; do
            inner="${workdir}/packages/pgvector-${pg}.tgz"
            echo "--- pgvector-${pg}.tgz ---"
            entries="$(tar -tzf "${inner}" | sort)"
            echo "${entries}"
            if ! grep -qx './packaging' <<<"${entries}" \
              && ! grep -qx 'packaging' <<<"${entries}"; then
              echo "ERROR: pgvector-${pg}.tgz missing packaging script"
              failed=1
            fi
            if ! grep -Eq "(^|/)pgvector/pgvector-${PGVECTOR_VERSION}\.tar\.gz$" <<<"${entries}"; then
              echo "ERROR: pgvector-${pg}.tgz missing pgvector/pgvector-${PGVECTOR_VERSION}.tar.gz"
              failed=1
            fi
          done
          if ((failed == 1)); then
            echo "ERROR: one or more pgvector packages are missing required inputs"
            exit 1
          fi
          echo "OK — every pgvector-N.tgz bundles packaging + pgvector-${PGVECTOR_VERSION}.tar.gz"

      - name: Upload release artifact (for inspection)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bosh-pgvector-release-ci-${{ github.run_id }}.tgz
          path: /tmp/bosh-pgvector-release-ci.tgz
          retention-days: 7

  pre-commit:
    name: pre-commit (linters + security)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install pre-commit + pyyaml
        run: pip install pre-commit pyyaml
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  secrets-scan:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
